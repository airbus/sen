load:
  - name: shell
    group: 2
    open: [my.tutorial, my.tutorial2]  # to see the created objects

build:

  # here we build a component that imports our package
  # and instantiate an object of our exported class
  - name: myComponent
    group: 3
    freqHz: 10
    imports: [level1S]
    objects:
      - name: myLevel1Object
        class: level1S.Level1ClassImpl
        data0: this is data0 of level1S
        data1: this is data1 of level1S
        bus: my.tutorial
  - name: myComponent2
    group: 3
    freqHz: 10
    imports: [level0, level1S]
    objects:
      - name: myLevel0Object
        class: level0.Level0ClassImpl
        data0: this is level0 of level0
        bus: my.tutorial2
      - name: myLevel1Object2
        class: level1S.Level1ClassImpl
        data0: this is data0 of level1S
        data1: this is data1 of level1S
        bus: my.tutorial2
      - name: myLevel1With0Object
        class: level1S.Level1With0ClassImpl
        data0: this is data0 of level1S
        data1: this is data1 of level1S
        bus: my.tutorial2
