# yaml-language-server: $schema=../../../schemas/sen_examples.json
load:
  - name: shell
    group: 2
    open: [my.tutorial]  # to see the created objects

build:
  - name: myComponent
    freqHz: 30
    imports: [my_package]
    someParam: a value  # the data defined here will be passed to your component,
    someOtherParam: 5 s  # and then you can transform it to your native representation
    objects:
      - class: my_package.MyClassImpl
        name: myClass
        bus: my.tutorial
        prop1: some value
