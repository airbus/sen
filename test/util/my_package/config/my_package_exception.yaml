# yaml-language-server: $schema=../../../schemas/sen_examples.json
load:
  - name: shell
    group: 2
    open: [my.tutorial]  # to see the created objects
  - name: ether
    group: 2

build:
  - name: myComponent
    freqHz: 30
    imports: [my_package]
    objects:
      - class: my_package.MyClassImpl
        name: myClass
        bus: my.tutorial
        prop1: some value
        throwException: true
