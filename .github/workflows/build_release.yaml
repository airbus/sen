name: Build release

on:
  push:
    tags:
      - \d+.\d+.\d+
      - \d+.\d+.\d+-rc\d+

permissions:
  contents: write

jobs:
  compute-matrix-jobs:
    name: "Generate build matrix"
    runs-on: ubuntu-latest
    outputs:
      jobs: ${{ steps.compute-jobs.outputs.jobs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - id: compute-jobs
        run: python .github/scripts/generate_matrix_jobs.py --release

  create_release_with_artifacts:
    name: "Build Job: ${{ matrix.compiler.name }}-${{ matrix.compiler.version }} C++${{ matrix.std }} [${{ matrix.build_type }}]"
    needs: compute-matrix-jobs
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJson(needs.compute-matrix-jobs.outputs.jobs) }}
    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup build context
        uses: ./.github/actions/setup_build_context
        with:
          compiler: ${{ matrix.compiler }}

      - name: Generate release package
        run: |
          conan install . --build=missing
          conan build .
          cmake --build build/${{ matrix.compiler.name }}/Release/ --target package

      - name: Archive generated release package
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.compiler.name }}
          # sen-0.1.0-x86_64-linux-gnu-12.4.0-release.tar.gz
          # sen-0.1.0-amd64-windows-msvc-19.44.35223.0-release.zip
          path: build/${{ matrix.compiler.name }}/Release/sen-${{ github.ref_name }}-*

  attach_release_artifacts:
    name: "Create Release Draft"
    runs-on: ubuntu-latest
    needs: create_release_with_artifacts
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v5

      - name: Print context
        run: |
          sudo apt-get install -y file
          ls -rlisa

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: |
            release-*/*
          preserve_order: true
          draft: true
          prerelease: ${{ contains(github.ref_name, 'rc') }}
