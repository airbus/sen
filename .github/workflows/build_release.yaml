name: Build release

on:
  push:
    branches:
      - feat/release-workflow
    tags:
      - \d+.\d+.\d+
      - \d+.\d+.\d+-rc\d+

permissions:
  contents: write

jobs:
  compute-matrix-jobs:
    name: "Generate build matrix"
    runs-on: ubuntu-latest
    outputs:
      jobs: ${{ steps.compute-jobs.outputs.jobs }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - id: compute-jobs
        run: python .github/scripts/generate_matrix_jobs.py --release
  create_release_with_artifacts:
    name: "Build Job: ${{ matrix.compiler.name }}-${{ matrix.compiler.version }} C++${{ matrix.std }} [${{ matrix.build_type }}]"
    needs: compute-matrix-jobs
    runs-on: self-hosted
    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJson(needs.compute-matrix-jobs.outputs.jobs) }}
    env:
      CC: ${{ matrix.compiler.cc }}
      CXX: ${{ matrix.compiler.cxx }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: 3.x

      - name: Install gcc-${{ matrix.compiler.version }}
        if: matrix.compiler.name == 'gcc'
        shell: bash
        run: sudo apt-get install -y g++-${{ matrix.compiler.version }}

      - name: Install pip dependencies
        run: |
          pip install conan pytest

      - name: Setup conan profile
        shell: bash
        run: |
          rm ~/.conan2/profiles/default
          conan profile detect --force -vquiet
          cp .conan/profiles/sen_gcc ~/.conan2/profiles/default
          echo tools.system.package_manager:mode=install >> ~/.conan2/profiles/default
          echo tools.system.package_manager:sudo=True >> ~/.conan2/profiles/default
          sed -i '/^\[options\]$/i doxygen*:compiler.cppstd=20' ~/.conan2/profiles/default
          sed -i '/^\[tool_requires\]$/a &:doxygen/[>=1.15.0]' ~/.conan2/profiles/default
          conan profile show -pr default

      - name: Install system dependencies
        # need for clang compat with sdl2 2.24.0
        shell: bash
        run: sudo apt-get install -y libxext-dev

      - name: Generate release package
        run: |
          conan install . --build=missing
          cmake --preset=conan-gcc-release
          cmake --build build/gcc/Release/
          cmake --build build/gcc/Release/ --target package

      - name: Archive generated release package
        uses: actions/upload-artifact@v4
        with:
          name: release-gcc
          path: build/gcc/Release/sen-latest-x86_64-linux-gnu-12.4.0-release.tar.gz
  attach_release_artifacts:
    name: "Create Release Draft"
    runs-on: ubuntu-latest
    needs: create_release_with_artifacts
    steps:
      - name: Download all workflow run artifacts
        uses: actions/download-artifact@v5
      - name: Print context
        run: |
          sudo apt-get install -y file
          ls -lisa
          file sen-latest-x86_64-linux-gnu-12.4.0-release.tar.gz
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: |
            sen-latest-x86_64-linux-gnu-12.4.0-release.tar.gz
          preserve_order: true
          draft: true
          prerelease: ${{ contains(github.ref_name, 'rc') }}
