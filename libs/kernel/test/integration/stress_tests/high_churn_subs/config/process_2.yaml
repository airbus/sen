kernel:
  crashReportDisabled: true

load:
  - name: ether
    group: 10
    discovery:
      type: TcpDiscovery
      value:
        beamPeriod: 100 ms
        beamExpiryTime: 1 s
        hubAddress:
          host: sen-hub
          port: 65454

build:
  - name: terminatorComponent2
    group: 3
    freqHz: 30
    imports: [test_helpers, high_churn_subs]
    objects:
      - name: terminator2
        class: sen.test.ProcessTerminatorImpl
        bus: session.bus
  - name: consComp1
    group: 3
    freqHz: 100
    imports: [test_helpers, high_churn_subs]
    objects:
      - name: consumer1
        class: high_churn_subs.Consumer
        bus: session.bus
      - name: consumer2
        class: high_churn_subs.Consumer
        bus: session.bus
      - name: consumer3
        class: high_churn_subs.Consumer
        bus: session.bus
  - name: consComp2
    group: 3
    freqHz: 100
    imports: [test_helpers, high_churn_subs]
    objects:
      - name: consumer4
        class: high_churn_subs.Consumer
        bus: session.bus
      - name: consumer5
        class: high_churn_subs.Consumer
        bus: session.bus
  - name: consComp3
    group: 3
    freqHz: 100
    imports: [test_helpers, high_churn_subs]
    objects:
      - name: consumer6
        class: high_churn_subs.Consumer
        bus: session.bus
  - name: consComp4
    group: 3
    freqHz: 100
    imports: [test_helpers, high_churn_subs]
    objects:
      - name: consumer7
        class: high_churn_subs.Consumer
        bus: session.bus
      - name: consumer8
        class: high_churn_subs.Consumer
        bus: session.bus
  - name: consComp5
    group: 3
    freqHz: 100
    imports: [test_helpers, high_churn_subs]
    objects:
      - name: consumer9
        class: high_churn_subs.Consumer
        bus: session.bus
      - name: consumer10
        class: high_churn_subs.Consumer
        bus: session.bus
