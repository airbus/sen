kernel:
  crashReportDisabled: true

load:
  - name: ether
    group: 10
    discovery:
      type: TcpDiscovery
      value:
        beamPeriod: 100 ms
        beamExpiryTime: 1 s
        hubAddress:
          host: sen-hub
          port: 65454

build:
  - name: terminatorComponent2
    group: 3
    freqHz: 30
    imports: [test_helpers, high_churn_subs]
    objects:
      - name: terminator2
        class: sen.test.ProcessTerminatorImpl
        bus: session.bus
  - name: consComp6
    group: 3
    freqHz: 100
    imports: [test_helpers, high_churn_subs]
    objects:
      - name: consumer11
        class: high_churn_subs.Consumer
        bus: session.bus
      - name: consumer12
        class: high_churn_subs.Consumer
        bus: session.bus
      - name: consumer13
        class: high_churn_subs.Consumer
        bus: session.bus
  - name: consComp7
    group: 3
    freqHz: 100
    imports: [test_helpers, high_churn_subs]
