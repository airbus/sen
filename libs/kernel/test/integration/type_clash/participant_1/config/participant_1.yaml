load:
  - name: ether
    group: 10
    runDiscoveryHub: 65454
    discovery:
      type: TcpDiscovery
      value:
        beamPeriod: 200 ms
        beamExpiryTime: 1 s
        hubAddress:
          host: 127.0.0.1
          port: 65454

build:
  - name: app_1
    freqHz: 100
    group: 2
    imports: [type_clash_participant_1]
    objects:
      - name: obj_app_1
        class: sen.test.type_clash.App1ClassImpl
        bus: session.bus
