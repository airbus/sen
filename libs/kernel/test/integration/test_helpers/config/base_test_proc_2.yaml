kernel:
  crashReportDisabled: true

load:
  - name: ether
    group: 10
    discovery:
      type: TcpDiscovery
      value:
        beamPeriod: 100 ms
        beamExpiryTime: 1 s
        hubAddress:
          host: sen-hub
          port: 65454

build:
  - name: terminatorComponent2
    group: 3
    freqHz: 50
    imports: [test_helpers]
    objects:
      - name: terminator2
        class: sen.test.ProcessTerminatorImpl
        bus: session.bus
  - name: listenerComponent3
    group: 3
    freqHz: 50
    imports: [test_helpers]
    objects:
      - name: listener3
        class: sen.test.ListenerImpl
        bus: session.bus
      - name: listener4
        class: sen.test.ListenerImpl
        bus: session.bus
  - name: listenerComponent4
    group: 3
    freqHz: 50
    imports: [test_helpers]
    objects:
      - name: listener5
        class: sen.test.ListenerImpl
        bus: session.bus
