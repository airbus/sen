kernel:
  crashReportDisabled: true

load:
  - name: ether
    group: 10
    runDiscoveryHub: 65454
    discovery:
      type: TcpDiscovery
      value:
        beamPeriod: 100 ms
        beamExpiryTime: 1 s
        hubAddress:
          host: sen-hub
          port: 65454

build:
  - name: terminatorComponent1
    group: 3
    freqHz: 50
    imports: [test_helpers]
    objects:
      - name: terminator1
        class: sen.test.ProcessTerminatorImpl
        bus: session.bus
  - name: publisherComponent1
    group: 3
    freqHz: 50
    imports: [test_helpers]
    objects:
      - name: publisher1
        class: sen.test.PublisherImpl
        numOfListeners: 7
        bus: session.bus
  - name: listenerComponent1
    group: 3
    freqHz: 50
    imports: [test_helpers]
    objects:
      - name: listener1
        class: sen.test.ListenerImpl
        bus: session.bus
  - name: listenerComponent2
    group: 3
    freqHz: 50
    imports: [test_helpers]
    objects:
      - name: listener2
        class: sen.test.ListenerImpl
        bus: session.bus
