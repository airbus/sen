kernel:
  crashReportDisabled: true

load:
  - name: ether
    group: 10
    discovery:
      type: TcpDiscovery
      value:
        beamPeriod: 100 ms
        beamExpiryTime: 1 s
        hubAddress:
          host: sen-hub
          port: 65454

build:
  - name: terminatorComponent3
    group: 3
    freqHz: 50
    imports: [test_helpers, interest_filtering]
    objects:
      - name: terminator3
        class: interest_filtering.ProcessTerminatorImpl
        bus: session.bus
  - name: listenerComponent5
    group: 3
    freqHz: 50
    imports: [test_helpers, interest_filtering]
    objects:
      - name: listener6
        class: interest_filtering.ListenerTestObjectAll
        bus: session.bus
  - name: listenerComponent6
    group: 3
    freqHz: 50
    imports: [test_helpers, interest_filtering]
    objects:
      - name: listener7
        class: interest_filtering.ListenerTestObjectQueryFloat
        bus: session.bus
