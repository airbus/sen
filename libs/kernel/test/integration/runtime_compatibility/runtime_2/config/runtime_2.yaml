load:
  - name: ether
    group: 10
    discovery:
      type: TcpDiscovery
      value:
        beamPeriod: 200 ms
        beamExpiryTime: 1 s
        hubAddress:
          host: 127.0.0.1
          port: 65454

build:
  - name: comp_2
    group: 2
    freqHz: 100
    imports: [runtime_2]
    objects:
      - name: tester2
        class: sen.test.runtime.TesterImpl
        bus: session.bus
